<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Sign In — Visora</title>
  <link rel="icon" type="image/png" href="assets/branding/visora-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">

    <div class="login-logo-area">
      <img src="assets/branding/visora-logo.png" alt="" class="navbar-logo-mark-image">
      <span class="login-wordmark">Visora</span>
    </div>

    <div class="login-heading">
      <h1 class="login-title">Sign in to your workspace</h1>
      <p class="login-subtitle">Access the industrial knowledge base and machine maintenance records.</p>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email address</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@company.ae" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="login-error" id="loginError" aria-live="polite"></div>

      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

  </div>

  <script type="module">
    import { auth, onAuthStateChanged, signInWithEmailAndPassword } from './auth.js';

    onAuthStateChanged(auth, user => {
      if (user) window.location.replace('index.html');
    });

    const form     = document.getElementById('loginForm');
    const emailEl  = document.getElementById('loginEmail');
    const passEl   = document.getElementById('loginPassword');
    const errorEl  = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.textContent  = '';
      loginBtn.disabled    = true;
      loginBtn.textContent = 'Signing in…';

      try {
        await signInWithEmailAndPassword(auth, emailEl.value.trim(), passEl.value);
        window.location.replace('index.html');
      } catch (err) {
        const knownBadCreds = ['auth/invalid-credential', 'auth/wrong-password', 'auth/user-not-found'];
        errorEl.textContent = knownBadCreds.includes(err.code)
          ? 'Incorrect email or password.'
          : 'Sign-in failed. Please try again.';
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
