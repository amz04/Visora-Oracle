<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Visora — Machine Details</title>
  <link rel="icon" type="image/png" href="assets/branding/visora-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="assets/branding/visora-logo.png" alt="" class="navbar-logo-mark-image">
      <span class="navbar-wordmark">Visora</span>
    </a>
    <div class="navbar-actions">
      <div class="navbar-user-info" id="navUserInfo">
        <span class="navbar-user-name" id="navUserName"></span>
        <span class="navbar-role-badge" id="navRoleBadge"></span>
      </div>
      <div class="navbar-avatar" id="navAvatar"></div>
      <button class="navbar-icon-btn" id="signOutBtn" title="Sign out">
        <i data-lucide="log-out" style="width:16px;height:16px;"></i>
      </button>
    </div>
  </nav>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="index.html">Machines</a>
    <span class="breadcrumb-sep"><i data-lucide="chevron-right" style="width:12px;height:12px;"></i></span>
    <span class="breadcrumb-current" id="breadcrumbMachine">Loading...</span>
  </div>

  <!-- Three-panel layout -->
  <div class="details-layout">

    <!-- Left Panel Wrapper -->
    <div class="panel-left-wrapper">
      <div class="panel-left" id="panelLeft">

        <!-- Top half: Maintenance Log -->
        <div class="panel-section">
          <div class="panel-header">
            <span class="panel-header-title">Maintenance Log</span>
            <div style="display:flex;align-items:center;gap:4px;">
              <button class="panel-icon-btn" title="Filter">
                <i data-lucide="sliders-horizontal" style="width:14px;height:14px;"></i>
              </button>
              <button class="panel-icon-btn senior-only" id="addMaintenanceBtn" title="Add entry">
                <i data-lucide="plus" style="width:14px;height:14px;"></i>
              </button>
            </div>
          </div>
          <div class="log-scroll" id="logScroll"></div>
        </div>

        <div class="panel-section-divider"></div>

        <!-- Bottom half: Inspection Log -->
        <div class="panel-section panel-section--btn">
          <div class="panel-header">
            <span class="panel-header-title">Inspection Log</span>
            <button class="panel-icon-btn" title="View">
              <i data-lucide="clipboard-list" style="width:14px;height:14px;"></i>
            </button>
          </div>
          <div class="insp-btn-container">
            <button class="insp-log-btn" id="viewInspectionLogBtn">
              <i data-lucide="clipboard-list" style="width:15px;height:15px;"></i>
              View Inspection Log
            </button>
          </div>
        </div>

      </div>
      <button class="panel-collapse-btn" id="collapseBtn" title="Collapse panel">
        <i data-lucide="chevron-left" style="width:14px;height:14px;" id="collapseIcon"></i>
      </button>
    </div>

    <!-- Middle Panel — Chat -->
    <div class="panel-middle" id="panelMiddle">
      <div class="chat-machine-header">
        <div class="chat-machine-thumb" id="chatThumb">
          <i data-lucide="cpu" style="width:20px;height:20px;"></i>
        </div>
        <div class="chat-machine-info">
          <div class="chat-machine-name" id="chatMachineName">Loading...</div>
          <div class="chat-machine-sub">AI Assistant — specialized for this machine</div>
        </div>
        <div class="chat-machine-status" id="chatMachineStatus">
          <div class="dot"></div>
          <span id="chatStatusText">Operational</span>
        </div>
      </div>

      <div class="chat-area" id="chatArea"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask about this machine...">
          <button class="chat-send-btn" id="chatSendBtn">
            <i data-lucide="send" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Panel — Videos -->
    <div class="panel-right">
      <div class="panel-header">
        <span class="panel-header-title">Recordings</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <button class="panel-icon-btn" title="Sort">
            <i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i>
          </button>
          <button class="panel-icon-btn senior-only" id="uploadVideoBtn" title="Upload recording">
            <i data-lucide="upload" style="width:14px;height:14px;"></i>
          </button>
        </div>
      </div>
      <div class="video-scroll" id="videoScroll"></div>
    </div>

  </div>

  <!-- Session Detail Overlay -->
  <div class="overlay-backdrop" id="sessionOverlay">
    <div class="session-overlay">
      <div class="session-overlay-header">
        <button class="overlay-back-btn" id="sessionOverlayBack">
          <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
          Back
        </button>
        <button class="overlay-close-btn" id="sessionOverlayClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <div class="session-overlay-body" id="sessionOverlayBody"></div>
    </div>
  </div>

  <!-- Video Preview Overlay -->
  <div class="video-overlay-backdrop" id="videoOverlay">
    <div class="video-overlay">
      <div class="video-overlay-header">
        <button class="overlay-close-btn" id="videoOverlayClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <div class="video-overlay-body">

        <!-- Video Player Section -->
        <div class="video-player-section">
          <div class="video-player-wrapper">
            <video id="videoEl" preload="metadata" style="width:100%;height:100%;object-fit:contain;"></video>
          </div>
          <div class="custom-controls">
            <div class="progress-bar-wrapper" id="progressBarWrapper">
              <div class="progress-fill" id="progressFill" style="width:0%"></div>
              <div id="chapterDots"></div>
            </div>
            <div class="controls-row">
              <button class="ctrl-btn" id="skipBackBtn" title="Skip back 10s">
                <i data-lucide="skip-back" style="width:15px;height:15px;"></i>
              </button>
              <button class="ctrl-btn play-pause" id="playPauseBtn">
                <i data-lucide="play" style="width:15px;height:15px;" id="playPauseIcon"></i>
              </button>
              <button class="ctrl-btn" id="skipFwdBtn" title="Skip forward 10s">
                <i data-lucide="skip-forward" style="width:15px;height:15px;"></i>
              </button>
              <div class="volume-wrapper">
                <button class="ctrl-btn" id="muteBtn">
                  <i data-lucide="volume-2" style="width:15px;height:15px;" id="volumeIcon"></i>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
              </div>
              <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
              <div style="flex:1;"></div>
              <select class="speed-select" id="speedSelect">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>
              <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
                <i data-lucide="maximize-2" style="width:15px;height:15px;"></i>
              </button>
            </div>
          </div>
          <div class="video-meta" id="videoMeta"></div>
        </div>

        <!-- Info Section -->
        <div class="video-info-section">
          <div class="video-tabs">
            <button class="video-tab active" data-tab="overview">Overview</button>
            <button class="video-tab" data-tab="steps">Steps</button>
            <button class="video-tab" data-tab="resources">Resources</button>
          </div>
          <div class="video-tab-content">
            <div class="tab-pane active" id="tab-overview"></div>
            <div class="tab-pane" id="tab-steps"></div>
            <div class="tab-pane" id="tab-resources"></div>
          </div>
          <div class="related-sessions-section" id="relatedSessions"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- PDF Viewer Overlay -->
  <div class="pdf-overlay-backdrop" id="pdfOverlay">
    <div class="pdf-overlay">
      <div class="pdf-overlay-header">
        <div class="pdf-overlay-meta">
          <span class="pdf-overlay-title" id="pdfOverlayTitle"></span>
          <span class="pdf-overlay-page" id="pdfOverlayPage"></span>
        </div>
        <button class="overlay-close-btn" id="pdfOverlayClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <div class="pdf-overlay-body">
        <div class="pdf-viewer-wrap" id="pdfViewerWrap">
          <div class="pdf-loading" id="pdfLoading">
            <div class="pdf-loading-spinner"></div>
            <span>Loading…</span>
          </div>
          <canvas id="pdfCanvas"></canvas>
        </div>
        <div class="pdf-nav">
          <button class="pdf-nav-btn" id="pdfPrevBtn" disabled>
            <i data-lucide="chevron-left" style="width:14px;height:14px;"></i>
          </button>
          <span class="pdf-nav-label" id="pdfNavLabel">—</span>
          <button class="pdf-nav-btn" id="pdfNextBtn" disabled>
            <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Inspection Log Modal -->
  <div class="insp-modal-backdrop" id="inspectionLogModal">
    <div class="insp-modal-card">
      <div class="insp-modal-header">
        <span class="insp-modal-title">Inspection Log</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-ai senior-only" id="addInspEntryBtn" style="font-size:12px;padding:5px 10px;gap:5px;">
            <i data-lucide="plus" style="width:12px;height:12px;"></i>
            Add Entry
          </button>
          <button class="overlay-close-btn" id="inspModalClose">
            <i data-lucide="x" style="width:14px;height:14px;"></i>
          </button>
        </div>
      </div>
      <div class="insp-equipment-grid" id="inspEquipmentGrid"></div>
      <div class="insp-table-wrap" id="inspTableWrap"></div>
    </div>
  </div>

  <!-- Work Order Detail Overlay -->
  <div class="overlay-backdrop" id="workOrderOverlay">
    <div class="session-overlay wo-overlay">
      <div class="session-overlay-header">
        <button class="overlay-back-btn" id="woOverlayBack">
          <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
          Back
        </button>
        <button class="overlay-close-btn" id="woOverlayClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <div class="session-overlay-body" id="woOverlayBody"></div>
    </div>
  </div>

  <!-- Upload Recording Modal -->
  <div class="form-modal-backdrop" id="uploadVideoModal">
    <div class="modal-form-card">
      <div class="modal-form-header">
        <span class="modal-form-title">Upload Recording</span>
        <button class="overlay-close-btn" id="uploadVideoModalClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <form class="modal-form-body" id="uploadVideoForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="uvTitle">Title</label>
          <input class="form-input" type="text" id="uvTitle" placeholder="e.g. Belt Tension Adjustment" required>
        </div>
        <div class="form-group">
          <label class="form-label">Machine</label>
          <input class="form-input" type="text" id="uvMachine" disabled>
        </div>
        <div class="form-group">
          <label class="form-label" for="uvTechnician">Technician</label>
          <input class="form-input" type="text" id="uvTechnician" placeholder="Full name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="uvSeverity">Severity</label>
            <select class="form-input form-select" id="uvSeverity">
              <option value="routine">Routine</option>
              <option value="warning">Warning</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="uvDuration">Duration</label>
            <input class="form-input" type="text" id="uvDuration" placeholder="e.g. 2:30">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="uvDescription">Description</label>
          <textarea class="form-input form-textarea" id="uvDescription" rows="3" placeholder="What does this recording cover?"></textarea>
        </div>
        <div class="modal-form-footer">
          <button type="button" class="btn-details" id="uploadVideoCancelBtn">Cancel</button>
          <button type="submit" class="btn-ai">
            <i data-lucide="upload" style="width:13px;height:13px;"></i>
            Upload Recording
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Maintenance Entry Modal -->
  <div class="form-modal-backdrop" id="addMaintenanceModal">
    <div class="modal-form-card">
      <div class="modal-form-header">
        <span class="modal-form-title">Add Maintenance Entry</span>
        <button class="overlay-close-btn" id="addMaintenanceModalClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <form class="modal-form-body" id="addMaintenanceForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="amDate">Date</label>
            <input class="form-input" type="date" id="amDate" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="amSeverity">Severity</label>
            <select class="form-input form-select" id="amSeverity">
              <option value="routine">Routine</option>
              <option value="warning">Warning</option>
              <option value="critical">Critical</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="amTitle">Title</label>
          <input class="form-input" type="text" id="amTitle" placeholder="e.g. Bearing Replacement" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="amTechnician">Technician</label>
            <input class="form-input" type="text" id="amTechnician" placeholder="Full name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="amType">Type</label>
            <select class="form-input form-select" id="amType">
              <option value="Corrective">Corrective</option>
              <option value="Preventive">Preventive</option>
              <option value="Inspection">Inspection</option>
              <option value="Emergency">Emergency</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="amDescription">Description</label>
          <textarea class="form-input form-textarea" id="amDescription" rows="3" placeholder="Describe the maintenance work performed..."></textarea>
        </div>
        <div class="modal-form-footer">
          <button type="button" class="btn-details" id="addMaintenanceCancelBtn">Cancel</button>
          <button type="submit" class="btn-ai">
            <i data-lucide="plus" style="width:13px;height:13px;"></i>
            Add Entry
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Inspection Entry Modal (z-top stacks above inspection log) -->
  <div class="form-modal-backdrop z-top" id="addInspEntryModal">
    <div class="modal-form-card">
      <div class="modal-form-header">
        <span class="modal-form-title">Add Work Order Entry</span>
        <button class="overlay-close-btn" id="addInspEntryModalClose">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>
      <form class="modal-form-body" id="addInspEntryForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="aieWONum">WO #</label>
            <input class="form-input" type="text" id="aieWONum" placeholder="e.g. #0042" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="aieDate">Date</label>
            <input class="form-input" type="date" id="aieDate" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="aieType">Type</label>
            <select class="form-input form-select" id="aieType">
              <option>Corrective</option>
              <option>Preventive</option>
              <option>Inspection</option>
              <option>Emergency</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="aieStatus">Status</label>
            <select class="form-input form-select" id="aieStatus">
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="aieTechnician">Technician</label>
            <input class="form-input" type="text" id="aieTechnician" placeholder="Full name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="aieTimeTaken">Time Taken</label>
            <input class="form-input" type="text" id="aieTimeTaken" placeholder="e.g. 2h 30m">
          </div>
        </div>
        <div class="modal-form-footer">
          <button type="button" class="btn-details" id="addInspEntryCancelBtn">Cancel</button>
          <button type="submit" class="btn-ai">Add Entry</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
  <script src="rag.js"></script>
  <script src="machine.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged, applySession, setupSignOut } from './auth.js';

    document.body.style.visibility = 'hidden';

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.replace('login.html'); return; }
      await applySession(user);
      setupSignOut('login.html');
      document.body.style.visibility = 'visible';
    });
  </script>
</body>
</html>
